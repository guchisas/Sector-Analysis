name: Auto Reporter

on:
  schedule:
    # UTC時間での指定です。JST (日本時間) = UTC + 9時間
    # 日本時間 19:00 に実行したい場合、UTCでは 10:00 となります
    # (※米国標準時間 EST での朝 5:00 に該当します)
    - cron: '0 10 * * *'
  
  # GitHubの画面から手動で実行（テスト用）できるようにする設定
  workflow_dispatch:

jobs:
  run-reporter:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # pipのキャッシュを有効にしてインストールを高速化
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Auto Reporter
        env:
          # GitHub SecretsからAPIキーやトークンを読み込む
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python scripts/auto_reporter.py
